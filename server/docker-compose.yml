services:
  mirror:
    build: .
    container_name: mirror
    restart: unless-stopped
    ports:
      - "${MIRROR_HTTP_PORT:-80}:80"
      - "${MIRROR_SSH_PORT:-2222}:2222"
    environment:
      MIRROR_HOST: ${MIRROR_HOST:?Set MIRROR_HOST}
      MIRROR_PORT: ${MIRROR_PORT:-7000}
      MIRROR_TLS: ${MIRROR_TLS:-off}
    volumes:
      - mirror-sshkeys:/etc/ssh/keys
    secrets:
      - mirror_authorized_keys

secrets:
  mirror_authorized_keys:
    file: ./authorized_keys

volumes:
  mirror-sshkeys:
